<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CANVAS Agency</title>
  <link href="https://fonts.googleapis.com/css?family=Inter:400,600" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar glass">
  <div class="logo">
  <img src="images/logo.png" alt="CANVAS Agency Logo">
</div>

  <nav class="nav-links">
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#">Services</a>
    <a href="#">Portfolio</a>
    <a href="#" class="contact-btn">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">

  <!-- Animated Gradient -->
  <div class="gradient-bg"></div>

  <div class="hero-content glass">
    <h1>Your Brand, Our Canvas.</h1>
    <p>Creative marketing solutions to elevate your brand.</p>
    <button class="btn">Start a Project</button>
  </div>

</section>

<!-- ABOUT -->
<section id="about" class="about">

  <div class="about-left">
    <h2>ABOUT US</h2>
  </div>

  <div class="about-cards">

    <div class="folder-card">
      <div class="folder-top"></div>
      <div class="folder-content">
        <h3>Our Mission</h3>
      </div>
    </div>

    <div class="folder-card">
      <div class="folder-top"></div>
      <div class="folder-content">
        <h3>Our Vision</h3>
      </div>
    </div>

  </div>

</section>

</body>
</html>
